<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Mercari Opener</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    h1 { font-size: 20px; color: #333; margin-bottom: 8px; }
    p { font-size: 13px; color: #888; margin-bottom: 16px; }

    .mode-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .mode-btn {
      flex: 1;
      padding: 10px;
      border: 2px solid #ddd;
      border-radius: 8px;
      background: white;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      color: #555;
    }
    .mode-btn.active {
      border-color: #ff6b6b;
      background: #fff0f0;
      color: #ff6b6b;
      font-weight: bold;
    }

    textarea {
      width: 100%;
      height: 100px;
      border: 2px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: #ff6b6b; }

    button.open-btn {
      margin-top: 14px;
      width: 100%;
      padding: 14px;
      background: #ff6b6b;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button.open-btn:hover { background: #e85555; }

    #result {
      margin-top: 16px;
      font-size: 13px;
      color: #555;
      min-height: 20px;
      word-break: break-all;
    }
    #result.error { color: #e53935; }
    #result.success { color: #43a047; }
    #result .link-list { margin-top: 8px; }
    #result .link-list a {
      display: block;
      color: #1a73e8;
      font-size: 12px;
      margin: 3px 0;
      text-decoration: none;
    }
    #result .link-list a:hover { text-decoration: underline; }
    #result .link-hint {
      font-size: 11px;
      color: #aaa;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Mercari Opener</h1>
    <p>상품 ID를 빈칸으로 구분하여 입력하면 새 탭으로 엽니다.</p>

    <div class="mode-toggle">
      <button class="mode-btn active" id="btn-transaction" onclick="setMode('transaction')">거래화면</button>
      <button class="mode-btn" id="btn-item" onclick="setMode('item')">상품페이지</button>
    </div>

    <textarea id="ids" placeholder="예: m24285068189 m53716215627 m53606061438"></textarea>
    <button class="open-btn" onclick="openTabs()">열기</button>
    <div id="result"></div>
  </div>

  <script>
    var currentMode = 'transaction';

    function setMode(mode) {
      currentMode = mode;
      document.getElementById('btn-transaction').classList.toggle('active', mode === 'transaction');
      document.getElementById('btn-item').classList.toggle('active', mode === 'item');
    }

    function openTabs() {
      var input = document.getElementById('ids').value.trim();
      var result = document.getElementById('result');

      if (!input) {
        result.className = 'error';
        result.textContent = '상품 ID를 입력해주세요.';
        return;
      }

      var ids = input.split(/\s+/).filter(Boolean);
      var base = currentMode === 'transaction'
        ? 'https://jp.mercari.com/transaction/'
        : 'https://jp.mercari.com/item/';

      ids.forEach(function(id) {
        var a = document.createElement('a');
        a.href = base + id;
        a.target = 'mercari_' + id;
        a.rel = 'noopener';
        a.style.display = 'none';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      });

      document.getElementById('ids').value = '';

      var modeName = currentMode === 'transaction' ? '거래화면' : '상품페이지';
      var linkItems = ids.map(function(id) {
        return '<a href="' + base + id + '" target="mercari_' + id + '" rel="noopener">' + id + '</a>';
      }).join('');

      result.className = 'success';
      result.innerHTML =
        ids.length + '개의 탭을 열었습니다 (' + modeName + ')' +
        '<div class="link-hint">탭이 차단된 경우 아래 링크를 직접 클릭하세요</div>' +
        '<div class="link-list">' + linkItems + '</div>';
    }

    // URL 파라미터로 ids 자동 입력
    (function() {
      var params = new URLSearchParams(window.location.search);
      var ids = params.get('ids');
      var mode = params.get('mode');
      if (mode === 'item' || mode === 'transaction') setMode(mode);
      if (ids) {
        document.getElementById('ids').value = ids.trim();
      }
    })();

    document.getElementById('ids').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && e.ctrlKey) openTabs();
    });
  </script>
</body>
</html>
